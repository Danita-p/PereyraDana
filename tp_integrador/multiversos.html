<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Multiverso de Personajes </h1>
    <input id="busqueda" type="text" placeholder="Busqueda personaje"> 
    <select id="seleccion"> 
        <option value="rick"> Rick and Morty </option>
        <option value="simpsons"> Los Simpsons </option>
        <option value="ambos"> Ambos </option>
    </select>
    <button id="buscar"> Buscar </button>
    <select id="estados"> 
        <option value="todos"> Todos </option>
        <option value="alive"> Alive </option>
        <option value="dead"> Dead </option>
        <option value="unknown"> unknown </option>
    </select>
    <select id="ordenar"> 
        <option value="ninguno"> Ninguno </option>
        <option value="a-z"> A-Z </option>
        <option value="z-a"> Z-A </option>
    </select>
    <h3> Estadisticas </h3>
    <div id="estadistica"> </div>
    <div id="resultado"> </div>
    <h3> Favoritos </h3>
    <div id="favoritos"> </div>

    <script> 
        const busqueda = document.getElementById('busqueda'); 
        const seleccionar = document.getElementById('seleccion'); 
        const botonBuscar = document.getElementById('buscar'); 
        const resultado = document.getElementById('resultado'); 
        const estados = document.getElementById('estados'); 
        const ordenar = document.getElementById('ordenar'); 
        const estadistica = document.getElementById('estadistica'); 
        const favoritos = document.getElementById('favoritos'); 
        let listaFavoritos = JSON.parse(localStorage.getItem('favoritos')) || [];
        let todosLosPersonajes = []; 

        async function personajesRM (nombre) {
            try {
            const url = nombre
            ? `https://rickandmortyapi.com/api/character/?name=${nombre}`
            : `https://rickandmortyapi.com/api/character`;
            const response = await fetch(url); 
            if (!response.ok) {
                throw new Error(`Error en Rick y Morty: ${response.status}`); 
            }
            const data = await response.json(); 
             return data.results; 
            } catch (error) {
            resultado.innerHTML += `Error: ${error.message}`; 
            return []; 
            }
        }

        async function personajeSM () {
            try {
            const response = await fetch("https://thesimpsonsapi.com/api/characters"); 
            if (!response.ok) {
                throw new Error(`Error en Los Simpsons: ${response.status}`); 
            }
            const data = await response.json(); 
            return data.results; 
            } catch (error) {
            resultado.innerHTML += `Error: ${error.message}`; 
            return []; 
            }
        }

        function normalizarPersonajes (personaje, origen) {
            if (origen === "rick") {
                return {
                    id: personaje.id, 
                    nombre: personaje.name, 
                    imagen: personaje.image, 
                    estado: personaje.status, 
                    genero: personaje.gender,
                    detalle: personaje.species,
                    origen: "Rick and Morty"
                }; 
            } else {
                return {
                    id: personaje.id, 
                    nombre: personaje.name,
                    imagen: `https://cdn.thesimpsonsapi.com/200${personaje.portrait_path}`, 
                    estado: personaje.status,
                    genero: personaje.gender,
                    detalle: personaje.occupation,
                    origen: "Simpsons" 
                }; 
            }
        } 

        async function segunSeleccion () {
        const buscado = busqueda.value.toLowerCase(); 
        const seleccionado = seleccionar.value; 
        const estadoS = estados.value; 
        const ordenarS = ordenar.value; 
        let listaRM = []; 
        let listaS= []; 
        try {
            if (seleccionado === "rick") {
                listaRM = await personajesRM(buscado); 
            }
            else if (seleccionado === "simpsons") {
                listaS = await personajeSM(buscado); 
            }
            else {
                listaRM = await personajesRM(buscado);
                listaS = await personajeSM();
            }
            const RMnormalizado = listaRM.map(p => normalizarPersonajes(p, "rick"));
            const Snormalizado = listaS.map(p => normalizarPersonajes(p, "simpsons")); 
            todosLosPersonajes = [...RMnormalizado, ...Snormalizado]; //unificamos en un solo array

            if (estadoS !== "todos") {
            todosLosPersonajes = todosLosPersonajes.filter(personaje => 
                personaje.estado.toLowerCase() === estadoS.toLowerCase() );
            }
            if (ordenarS === "a-z") {
            todosLosPersonajes.sort((a, b) => a.nombre.localeCompare(b.nombre));
            }
            else if (ordenarS === "z-a") {
            todosLosPersonajes.sort((a, b) => b.nombre.localeCompare(a.nombre));
            }
            resultado.innerHTML = ""; 
            estadisticas(todosLosPersonajes); //variable global 
            todosLosPersonajes.forEach(personaje => {
                const colorLabel = personaje.origen === "Simpsons" ? "#ffd900" : "#00ff1e";
                const esFav = listaFavoritos.some(p => p.id === personaje.id && p.origen === personaje.origen);
                const estrella = esFav ? "⭐ " : ""; 
                const funcionBoton = esFav 
                ? ""
                : `<button onclick="agregarFavoritos(${personaje.id}, '${personaje.origen}')"> Favoritos </button>`;
                resultado.innerHTML += `
                    <div style="border: 1px solid #ddd; border-radius: 8px; padding: 10px; margin: 10px; width: 200px; display: inline-block; vertical-align: top;">
                        <img src="${personaje.imagen}" style="width: 100%; border-radius: 4px;">
                        <h3>${personaje.nombre}</h3>
                        <p>Estado: ${personaje.estado}</p>
                        <p>Detalle: ${personaje.detalle}</p>
                        <span style="background: ${colorLabel}; padding: 2px 5px; font-size: 12px; font-weight: bold;">${personaje.origen}</span>
                        ${estrella} ${funcionBoton}
                    </div>
                `; 
            }); 
        } catch (error) {
            resultado.innerHTML = `Hubo un error al encontrar los personajes: ${error.message}`; 
        } 
    }

    function estadisticas (listas) {
        const totalCargado = listas.length; 
        const generos = listas.reduce((acumulador, personaje) => {
            const genero = personaje.genero; 
            acumulador[genero] = (acumulador[genero] || 0) + 1;
            return acumulador;
        }, {});
        const estados = listas.reduce((acumulador, personaje) => {
            const estado = personaje.estado; 
            acumulador[estado] = (acumulador[estado] || 0) + 1; 
            return acumulador; 
        }, {}); 
        const universos = listas.reduce((acumulador, personaje) => {
            const origen = personaje.origen;
            acumulador[origen] = (acumulador[origen] || 0) + 1;
            return acumulador;
        }, {});
        const textoGeneros = Object.entries(generos).map(([g, c]) => `${g}: ${c}`).join(", ");
        const textoEstados = Object.entries(estados).map(([e, c]) => `${e}: ${c}`).join(", ");
        const textoUniversos = Object.entries(universos).map(([u, c]) => `${u}: ${c}`).join(", ");
        estadistica.innerHTML = `
        <p> Hay ${totalCargado} personajes </p> 
        <p> Hay ${textoGeneros} personajes </p> 
        <p> Hay ${textoEstados} personajes </p> 
        <p> Hay ${textoUniversos} personajes </p> `; 
    }

    function guardarFavoritos() {
        localStorage.setItem('favoritos', JSON.stringify(listaFavoritos));
        renderizarFavoritos();
    }

    function renderizarFavoritos() {
        favoritos.innerHTML = "";
        listaFavoritos.forEach(personaje => {
            favoritos.innerHTML += `
                <div style="border: 2px solid #ffca28; border-radius: 8px; padding: 10px; margin: 10px; width: 150px; display: inline-block; vertical-align: top; text-align: center; background: #fffde7;">
                    <img src="${personaje.imagen}" style="width: 100%; border-radius: 4px;">
                    <h4 style="margin: 5px 0; font-size: 14px;">${personaje.nombre}</h4>
                    <button onclick="eliminarFavoritos(${personaje.id}, '${personaje.origen}')"> Eliminar </button>
                </div>
            `;
        });
    }

    function agregarFavoritos(id, origen) {
        const yaExiste = listaFavoritos.some(p => p.id === id && p.origen === origen);
        if (!yaExiste) {
            const personajeEncontrado = todosLosPersonajes.find(p => p.id === id && p.origen === origen);
            if (personajeEncontrado) {
                listaFavoritos.push(personajeEncontrado);
                guardarFavoritos();
                segunSeleccion(); // actualizamos la vista en el html  
            }
        }
    }

    function eliminarFavoritos(id, origen) {
        listaFavoritos = listaFavoritos.filter(p => !(p.id === id && p.origen === origen));
        guardarFavoritos();
        segunSeleccion(); 
    }
    
    botonBuscar.addEventListener('click', segunSeleccion); 
    renderizarFavoritos();
    </script>
</body>
</html>
